name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: adalah
          POSTGRES_PASSWORD: adalah_dev
          POSTGRES_DB: adalah_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adalah -d adalah_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://adalah:adalah_dev@localhost:5432/adalah_test
      TEST_DATABASE_URL: postgresql://adalah:adalah_dev@localhost:5432/adalah_test
      JWT_SECRET: ci-test-secret-key-minimum-32-characters-long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_DAYS: 7
      NODE_ENV: test
      LLM_PROVIDER: mock
      EMBEDDER_PROVIDER: mock
      EMBEDDING_DIMENSIONS: 384

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run migrations
        run: npm run db:migrate -w @adalah/api

      - name: Run tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: adalah
          POSTGRES_PASSWORD: adalah_dev
          POSTGRES_DB: adalah
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adalah -d adalah"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      DATABASE_URL: postgresql://adalah:adalah_dev@localhost:5432/adalah
      JWT_SECRET: ci-test-secret-key-minimum-32-characters-long
      NEXT_PUBLIC_API_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Build SDK
        run: npm run build:sdk

      - name: Run E2E tests
        run: npm run test:e2e

  build:
    runs-on: ubuntu-latest
    needs: [test, e2e]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Verify API build output
        run: test -f apps/api/dist/server.js

      - name: Verify SDK build output
        run: test -f packages/sdk/dist/index.js

      - name: Verify Web standalone output
        run: test -f apps/web/.next/standalone/apps/web/server.js
