openapi: 3.1.0
info:
  title: Adalah Legal AI API
  version: 1.0.0
  description: REST API for Adalah legal AI platform

servers:
  - url: http://localhost:3001
    description: Local development

paths:
  /health:
    get:
      summary: Health check (liveness)
      tags: [System]
      responses:
        "200":
          description: OK

  /ready:
    get:
      summary: Readiness check (database + AI providers)
      tags: [System]
      responses:
        "200":
          description: Ready or degraded
        "503":
          description: Unavailable

  /metrics:
    get:
      summary: Prometheus metrics
      tags: [System]
      responses:
        "200":
          description: Prometheus text format
        "404":
          description: Metrics disabled

  /api/v1/auth/register:
    post:
      summary: Register new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
      responses:
        "201": { description: User created }

  /api/v1/auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200": { description: Tokens returned }

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]

  /api/v1/auth/logout:
    post:
      summary: Logout
      tags: [Auth]

  /api/v1/auth/me:
    get:
      summary: Current user
      tags: [Auth]
      security: [{ bearerAuth: [] }]

  /api/v1/users/me:
    get:
      summary: Get profile
      tags: [Users]
      security: [{ bearerAuth: [] }]
    patch:
      summary: Update profile
      tags: [Users]
      security: [{ bearerAuth: [] }]

  /api/v1/chat/sessions:
    get:
      summary: List sessions
      tags: [Chat]
      security: [{ bearerAuth: [] }]
    post:
      summary: Create session
      tags: [Chat]
      security: [{ bearerAuth: [] }]

  /api/v1/chat/sessions/{id}:
    get:
      summary: Get session with messages
      tags: [Chat]
      security: [{ bearerAuth: [] }]
    delete:
      summary: Delete session
      tags: [Chat]
      security: [{ bearerAuth: [] }]

  /api/v1/chat/sessions/{id}/messages:
    post:
      summary: Send message (JSON or SSE stream)
      tags: [Chat]
      security: [{ bearerAuth: [] }]

  /api/v1/documents:
    get:
      summary: List documents
      tags: [Documents]
      security: [{ bearerAuth: [] }]
    post:
      summary: Upload document
      tags: [Documents]
      security: [{ bearerAuth: [] }]

  /api/v1/documents/{id}:
    get:
      summary: Get document
      tags: [Documents]
      security: [{ bearerAuth: [] }]

  /api/v1/analytics/me:
    get:
      summary: User activity analytics
      tags: [Analytics]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  analytics:
                    $ref: "#/components/schemas/UserAnalytics"

  /api/v1/onboarding/status:
    get:
      summary: Lawyer onboarding status
      tags: [Onboarding]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Onboarding status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStatus"

  /api/v1/onboarding/lawyer:
    post:
      summary: Complete lawyer onboarding
      tags: [Onboarding]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LawyerOnboardingInput"
      responses:
        "201":
          description: User upgraded to lawyer
        "409":
          description: Onboarding already completed

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Citation:
      type: object
      properties:
        index: { type: integer }
        documentTitle: { type: string }
        excerpt: { type: string }
        confidence: { type: string, enum: [high, medium, low] }
        articles:
          type: array
          items:
            type: object
            properties:
              number: { type: string }
              label: { type: string }
              text: { type: string }

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: array }

    UserAnalytics:
      type: object
      properties:
        totalSessions: { type: integer }
        totalMessages: { type: integer }
        totalDocuments: { type: integer }
        messagesThisWeek: { type: integer }
        documentsReady: { type: integer }
        role: { type: string }
        isLawyer: { type: boolean }
        onboardingCompleted: { type: boolean }
        memberSince: { type: string, format: date-time }
        lastActivityAt: { type: string, format: date-time, nullable: true }

    LawyerProfile:
      type: object
      properties:
        licenseNumber: { type: string }
        specialization: { type: string }
        barAssociation: { type: string }
        phone: { type: string, nullable: true }
        completedAt: { type: string, format: date-time }

    OnboardingStatus:
      type: object
      properties:
        role: { type: string }
        isLawyer: { type: boolean }
        onboardingCompleted: { type: boolean }
        profile:
          oneOf:
            - $ref: "#/components/schemas/LawyerProfile"
            - type: "null"

    LawyerOnboardingInput:
      type: object
      required: [licenseNumber, specialization, barAssociation]
      properties:
        licenseNumber: { type: string, minLength: 3, maxLength: 64 }
        specialization: { type: string, minLength: 2, maxLength: 128 }
        barAssociation: { type: string, minLength: 2, maxLength: 128 }
        phone: { type: string, minLength: 8, maxLength: 32 }
