openapi: 3.1.0
info:
  title: Adalah Legal AI API
  version: 1.0.0
  description: REST API for Adalah legal AI platform

servers:
  - url: http://localhost:3001
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: OK

  /api/v1/auth/register:
    post:
      summary: Register new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
      responses:
        "201": { description: User created }

  /api/v1/auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200": { description: Tokens returned }

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]

  /api/v1/auth/logout:
    post:
      summary: Logout
      tags: [Auth]

  /api/v1/auth/me:
    get:
      summary: Current user
      tags: [Auth]
      security: [{ bearerAuth: [] }]

  /api/v1/users/me:
    get:
      summary: Get profile
      tags: [Users]
      security: [{ bearerAuth: [] }]
    patch:
      summary: Update profile
      tags: [Users]
      security: [{ bearerAuth: [] }]

  /api/v1/chat/sessions:
    get:
      summary: List sessions
      tags: [Chat]
      security: [{ bearerAuth: [] }]
    post:
      summary: Create session
      tags: [Chat]
      security: [{ bearerAuth: [] }]

  /api/v1/chat/sessions/{id}:
    get:
      summary: Get session with messages
      tags: [Chat]
      security: [{ bearerAuth: [] }]
    delete:
      summary: Delete session
      tags: [Chat]
      security: [{ bearerAuth: [] }]

  /api/v1/chat/sessions/{id}/messages:
    post:
      summary: Send message (JSON or SSE stream)
      tags: [Chat]
      security: [{ bearerAuth: [] }]

  /api/v1/documents:
    get:
      summary: List documents
      tags: [Documents]
      security: [{ bearerAuth: [] }]
    post:
      summary: Upload document
      tags: [Documents]
      security: [{ bearerAuth: [] }]

  /api/v1/documents/{id}:
    get:
      summary: Get document
      tags: [Documents]
      security: [{ bearerAuth: [] }]

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Citation:
      type: object
      properties:
        index: { type: integer }
        documentTitle: { type: string }
        excerpt: { type: string }
        confidence: { type: string, enum: [high, medium, low] }
        articles:
          type: array
          items:
            type: object
            properties:
              number: { type: string }
              label: { type: string }
              text: { type: string }

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: array }
