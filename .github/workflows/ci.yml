name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: adalah
          POSTGRES_PASSWORD: adalah_dev
          POSTGRES_DB: adalah_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adalah -d adalah_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://adalah:adalah_dev@localhost:5432/adalah_test
      TEST_DATABASE_URL: postgresql://adalah:adalah_dev@localhost:5432/adalah_test
      JWT_SECRET: ci-test-secret-key-minimum-32-characters-long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_DAYS: 7
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (typecheck)
        run: npm run lint

      - name: Run migrations
        run: npm run db:migrate -w @adalah/api

      - name: Run tests
        run: npm test
